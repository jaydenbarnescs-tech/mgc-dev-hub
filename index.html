<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGC 開発ハブ — Dev Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e17; --bg-card: #111827; --bg-header: #0c0f17;
    --border: #1f2937; --border2: #374151;
    --text: #e5e7eb; --text-sub: #9ca3af; --text-dim: #6b7280;
    --accent: #818cf8; --accent2: #6366f1;
    --grad: linear-gradient(135deg, #6d28d9, #2563eb);
    --green: #22c55e; --amber: #f59e0b; --blue: #3b82f6; --purple: #a855f7;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans','Noto Sans JP',sans-serif; min-height: 100vh; font-size: 14px; line-height: 1.5; }

  header {
    padding: 14px 28px; border-bottom: 1px solid var(--border);
    background: var(--bg-header); display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 38px; height: 38px; border-radius: 10px; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .logo-text { font-weight: 700; font-size: 16px; color: #f9fafb; }
  .logo-sub  { font-size: 11px; color: var(--text-dim); }
  .header-meta { display: flex; align-items: center; gap: 16px; }
  .header-meta-text { font-size: 11px; color: var(--text-dim); text-align: right; }
  .header-meta-text strong { color: var(--accent); }

  /* ── NAV TABS ── */
  .nav-tabs { display: flex; gap: 4px; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--bg-header); }
  .nav-tab { padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; border: none; background: none; font-family: inherit; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px; display: flex; align-items: center; gap: 7px; }
  .nav-tab:hover { color: var(--text-sub); }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 28px; max-width: 1320px; margin: 0 auto; }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── STATS ── */
  .stats { display: flex; gap: 12px; margin-bottom: 26px; flex-wrap: wrap; }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 120px; }
  .stat-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 700; }
  .stat-sub   { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  /* ── FILTERS ── */
  .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
  .filter-btn { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500; transition: all .15s; border: 1px solid var(--border); background: transparent; color: var(--text-dim); }
  .filter-btn:hover  { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { border-color: var(--accent2); background: #1e1b4b; color: var(--accent); }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
